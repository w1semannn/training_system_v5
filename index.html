    var mm = (d.getMonth()+1)<10 ? "0"+(d.getMonth()+1) : (d.getMonth()+1);
    var dd = d.getDate()<10 ? "0"+d.getDate() : d.getDate();
    return d.getFullYear()+"-"+mm+"-"+dd;
  }
  function fmtDateRu(iso){
    if(!iso) return "";
    var p = iso.split("-");
    if(p.length!==3) return iso;
    var months = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
    return p[2]+" "+months[parseInt(p[1],10)-1]+" "+p[0];
  }
  function getLastEntry(exerciseName){
    var matches = state.diary.filter(function(e){
      var name = e.exercise==="Другое" ? (e.customName||"Другое") : e.exercise;
      return name === exerciseName;
    });
    if(matches.length===0) return null;
    matches.sort(function(a,b){ return b.date < a.date ? -1 : (b.date > a.date ? 1 : 0); });
    return matches[0];
  }

  function supersetBlock(block, idx){

    html += '</div>';

    var isGroup = block.pairs.length > 1;
    var isFill = block.mode === "fill";
    var isSupersetFill = block.mode === "superset_fill";
    var borderColor = isFill ? 'rgba(251,146,60,0.25)' : (isSupersetFill ? 'rgba(255,200,120,0.25)' : (isGroup?'rgba(200,245,74,0.18)':'rgba(255,255,255,0.05)'));
    var bgColor = isFill ? 'rgba(251,146,60,0.03)' : (isSupersetFill ? 'rgba(255,200,120,0.03)' : (isGroup?'rgba(200,245,74,0.02)':'transparent'));
    html += '<div style="border:1px solid '+borderColor+';border-radius:10px;padding:8px;background:'+bgColor+';">';

    if(isFill){
      html += '<div style="font-size:9px;color:#fb923c;opacity:.7;letter-spacing:1.5px;padding:4px 8px 8px;line-height:1.5;">⏵ ЗАПОЛНЕНИЕ ПАУЗЫ — доп. упражнения делаются ВНУТРИ отдыха первого</div>';
    } else if(isSupersetFill){
      html += '<div style="font-size:9px;color:#ffc878;opacity:.8;letter-spacing:1.5px;padding:4px 8px 8px;line-height:1.5;">⇄ СУПЕРСЕТ + ⏵ ЗАПОЛНЕНИЕ — 1-2 подряд, 3-й заполняет паузу отдыха</div>';
    } else if(isGroup){
      html += '<div style="font-size:9px;color:#c8f54a;opacity:.5;letter-spacing:2px;padding:4px 8px 8px;">⇄ СУПЕРСЕТ — ПОДРЯД, БЕЗ ПАУЗЫ МЕЖДУ УПРАЖНЕНИЯМИ</div>';

    block.pairs.forEach(function(ex, i){
      var accent = isFill ? "#fb923c" : (isSupersetFill ? "#ffc878" : "#c8f54a");

      if(isGroup && i < block.pairs.length - 1){
        var arrowLabel = (ex.restBetween === "в паузе" || (isFill && i===0)) ? "↳ ВО ВРЕМЯ ПАУЗЫ ↓" : (ex.restBetween === "подряд →" ? "↓ СРАЗУ ДАЛЬШЕ ↓" : "↳ ВО ВРЕМЯ ПАУЗЫ ↓");
        html += '<div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:2px 0 6px;"><span style="font-size:9px;color:#555;letter-spacing:1px;">'+arrowLabel+'</span></div>';
      }
    });
    html += '</div>';

    if(block.restAfter){
      html += '<div style="margin-top:10px;background:rgba(255,255,255,0.03);border:1px dashed #333;border-radius:10px;padding:12px 14px;text-align:center;">';
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:900;color:#c8f54a;letter-spacing:1px;">\u23F8 ОТДЫХ '+block.restAfter+'</div>';
      if(block.restAfterNote){
        html += '<div style="font-size:11px;color:#666;margin-top:4px;line-height:1.5;">'+esc(block.restAfterNote)+'</div>';
      }
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

      html += '<div style="padding:16px;">';
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;letter-spacing:3px;color:#555;margin-bottom:4px;margin-top:8px;">РАЗМИНКА</div>';
      html += '<div style="font-size:11px;color:#555;margin-bottom:16px;">~5 мин · перед каждой тренировкой</div>';
      html += '<div style="background:#111;border:1px solid #222;border-radius:10px;overflow:hidden;">';
      WARMUP.forEach(function(s,i){
        html += '<div style="display:flex;gap:14px;align-items:flex-start;padding:14px 16px;'+(i<WARMUP.length-1?'border-bottom:1px solid #1a1a1a;':'')+'">'+
          '<div style="width:22px;height:22px;border-radius:50%;background:rgba(200,245,74,0.1);border:1px solid rgba(200,245,74,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-size:10px;color:#c8f54a;font-weight:700;">'+s.n+'</span></div>'+
          '<div><div style="font-size:13px;color:#ddd;margin-bottom:3px;">'+esc(s.name)+'</div><div style="font-size:11px;color:#666;">'+esc(s.detail)+'</div></div>'+
        '</div>';
      });
      html += '</div>';
      html += '<div style="margin-top:12px;background:rgba(244,114,182,0.05);border:1px solid rgba(244,114,182,0.15);border-radius:8px;padding:12px 14px;font-size:11px;color:#888;line-height:1.6;">Плечо щёлкает — перед подтягиваниями обязательно вращение плеч и пассивный вис. Не пропускай.</div>';
      html += '</div>';
    }

    else if(state.tab==="cycle"){
      html += '<div style="padding:16px;">';
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;letter-spacing:3px;color:#555;margin-bottom:4px;margin-top:8px;">СКОЛЬЗЯЩИЙ ЦИКЛ</div>';
      html += '<div style="font-size:11px;color:#555;margin-bottom:16px;">Тренировка каждые 3 дня — независимо от дней недели</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;">';
      CYCLE_DOTS.forEach(function(c){
        html += '<div style="width:calc(14.28% - 6px);min-width:38px;padding:10px 4px;border-radius:8px;text-align:center;background:'+(c.active?'rgba(200,245,74,0.12)':'#111')+';border:1px solid '+(c.active?'rgba(200,245,74,0.4)':'#1a1a1a')+';">'+
          '<div style="font-size:9px;color:'+(c.active?'#c8f54a':'#444')+';letter-spacing:1px;margin-bottom:3px;">'+c.day+'</div>'+
          '<div style="font-size:11px;color:'+(c.active?'#c8f54a':'#333')+';font-weight:'+(c.active?'700':'400')+';">'+(c.active?'●':'○')+'</div>'+
        '</div>';
      });
      html += '</div>';
      html += '<div style="background:#111;border:1px solid #222;border-radius:10px;padding:16px;">';
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;letter-spacing:3px;color:#555;margin-bottom:12px;">ПРИМЕР ПЕРВЫХ 2 НЕДЕЛЬ</div>';
      CYCLE_PREVIEW.forEach(function(d){
        var day=d[0], label=d[1], active=d[2];
        html += '<div style="display:flex;gap:12px;align-items:center;margin-bottom:6px;opacity:'+(active?'1':'.4')+';"><div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:13px;color:'+(active?'#c8f54a':'#555')+';min-width:30px;">'+day+'</div><div style="font-size:12px;color:'+(active?'#ccc':'#444')+';">'+label+'</div></div>';
      });
      html += '</div></div>';
    }

    else if(state.tab==="progress"){
      html += '<div style="padding:16px;">';
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;letter-spacing:3px;color:#555;margin-bottom:16px;margin-top:8px;">ПРОГРЕССИЯ ПО ВЕСАМ</div>';
      PROGRESSION.forEach(function(p){
        html += '<div style="background:#111;border:1px solid #222;border-radius:10px;padding:14px 16px;margin-bottom:10px;"><div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:13px;color:#c8f54a;margin-bottom:6px;">'+esc(p.label)+'</div><div style="font-size:12px;color:#666;line-height:1.6;">'+esc(p.desc)+'</div></div>';
      });
      html += '<div style="background:rgba(200,245,74,0.04);border:1px solid rgba(200,245,74,0.12);border-radius:10px;padding:14px 16px;margin-top:4px;">';
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(200,245,74,0.5);margin-bottom:10px;">ВНЕ ЗАЛА</div>';
      [["Белок","~126–154 г/день (1.8–2.2 г/кг при 70 кг)"],["Калории","Поддерживающий уровень ±200 ккал"],["Сон","7–9 часов"],["NEAT","7 000–10 000 шагов/день"]].forEach(function(kv){
        html += '<div style="display:flex;gap:12px;margin-bottom:5px;align-items:baseline;"><span style="font-size:11px;color:#c8f54a;min-width:70px;font-weight:500;">'+kv[0]+'</span><span style="font-size:12px;color:#555;">'+kv[1]+'</span></div>';
      });
      html += '</div></div>';
    }

    else if(state.tab==="home_workout"){
      html += '<div style="padding:0 16px;">';
      html += '<div style="display:flex;gap:6px;padding:14px 0;">';
      HOME.forEach(function(d){
        var active = state.homeDay===d.id;
        html += '<button class="btn" data-homeday="'+d.id+'" style="flex:1;padding:8px 0;border-radius:6px;background:'+(active?'#fb923c':'#1a1a1a')+';color:'+(active?'#000':'#555')+';font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:16px;letter-spacing:2px;">'+d.label+'</button>';
      });
      html += '</div>';
      var day = HOME.filter(function(d){ return d.id===state.homeDay; })[0];
      var doneCount = day.exercises.filter(function(e){ return state.checked[day.id+'-'+e.id]; }).length;
      html += '<div style="margin-bottom:16px;">';
      html += '<div style="font-size:9px;letter-spacing:3px;color:#fb923c;opacity:.6;margin-bottom:3px;">'+day.tag+'</div>';
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:#fb923c;margin-bottom:8px;">'+day.title+'</div>';
      html += '<div style="display:flex;align-items:center;gap:10px;"><div style="flex:1;height:3px;background:#222;border-radius:2px;overflow:hidden;"><div style="width:'+(doneCount/day.exercises.length*100)+'%;height:100%;background:#fb923c;border-radius:2px;"></div></div><div style="font-size:11px;color:#555;white-space:nowrap;">'+doneCount+'/'+day.exercises.length+'</div></div>';
      html += '</div>';
      html += '<div style="display:flex;flex-direction:column;gap:2px;">';
      day.exercises.forEach(function(ex){
        html += exerciseRow(ex, day.id+'-'+ex.id, "#fb923c");
      });
      html += '</div></div>';
    }

    else if(state.tab==="home_warmup"){
      html += '<div style="padding:16px;">';
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;letter-spacing:3px;color:#555;margin-bottom:4px;margin-top:8px;">РАЗМИНКА ДОМА</div>';
      html += '<div style="font-size:11px;color:#555;margin-bottom:16px;">~3–4 мин · перед каждой домашней тренировкой</div>';
      html += '<div style="background:#111;border:1px solid #222;border-radius:10px;overflow:hidden;">';
      HOME_WARMUP.forEach(function(s,i){
        html += '<div style="display:flex;gap:14px;align-items:flex-start;padding:14px 16px;'+(i<HOME_WARMUP.length-1?'border-bottom:1px solid #1a1a1a;':'')+'">'+
          '<div style="width:22px;height:22px;border-radius:50%;background:rgba(251,146,60,0.1);border:1px solid rgba(251,146,60,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-size:10px;color:#fb923c;font-weight:700;">'+s.n+'</span></div>'+
          '<div><div style="font-size:13px;color:#ddd;margin-bottom:3px;">'+esc(s.name)+'</div><div style="font-size:11px;color:#666;">'+esc(s.detail)+'</div></div>'+
        '</div>';
      });
      html += '</div></div>';
    }

    c.innerHTML = html;
    attachContentEvents();
  }

  function attachContentEvents(){
    Array.prototype.forEach.call(document.querySelectorAll(".ex-row"), function(row){
      row.addEventListener("click", function(){
        var key = row.getAttribute("data-key");
        state.checked[key] = !state.checked[key];
        save();
        renderContent();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll(".note-btn"), function(btn){
      btn.addEventListener("click", function(e){
        e.stopPropagation();
        var key = btn.getAttribute("data-key");
        state.openNote = (state.openNote===key) ? null : key;
        renderContent();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-homeday]"), function(btn){
      btn.addEventListener("click", function(){
        state.homeDay = btn.getAttribute("data-homeday");
        state.openNote = null;
        renderContent();
      });
    });

    // Diary form events
    var exSelect = document.getElementById("diary-exercise");
    if(exSelect){
      exSelect.addEventListener("change", function(){
        var newEx = exSelect.value;
        state.diaryForm.exercise = newEx;
        state.diaryForm.customName = "";
        if(newEx !== "Другое"){
          var last = getLastEntry(newEx);
          if(last){
            state.diaryForm.weight = last.weight || "";
            state.diaryForm.sets = last.sets || "";
            state.diaryForm.reps = last.reps || "";
          } else {
            state.diaryForm.weight = "";
            state.diaryForm.sets = "";
            state.diaryForm.reps = "";
          }
          state.diaryForm.note = "";
        }
        renderContent();
      });
    }
    var addBtn = document.getElementById("diary-add-btn");
    if(addBtn){
      addBtn.addEventListener("click", function(){
        syncDiaryFormFromDOM();
        var f = state.diaryForm;
        if(!f.weight && !f.sets && !f.reps){
          alert("Заполни хотя бы вес, подходы или повторения");
          return;
        }
        var entry = {
          id: Date.now()+"_"+Math.random().toString(36).slice(2,8),
          exercise: f.exercise,
          customName: f.customName,
          date: f.date || todayISO(),
          weight: f.weight,
          sets: f.sets,
          reps: f.reps,
          note: f.note
        };
        state.diary.push(entry);
        saveDiary();
        // reset form but keep exercise selected for convenience
        state.diaryForm = { exercise:f.exercise, customName:"", date:"", weight:"", sets:"", reps:"", note:"" };
        renderContent();
      });
    }
    Array.prototype.forEach.call(document.querySelectorAll(".diary-delete-btn"), function(btn){
      btn.addEventListener("click", function(){
        var id = btn.getAttribute("data-id");
        state.diary = state.diary.filter(function(e){ return e.id !== id; });
        saveDiary();
        renderContent();
      });
    });

    // Diary mode switch
    Array.prototype.forEach.call(document.querySelectorAll(".diary-mode-btn"), function(btn){
      btn.addEventListener("click", function(){
        syncDiaryFormFromDOM();
        syncBulkFormFromDOM();
        state.diaryMode = btn.getAttribute("data-mode");
        renderContent();
      });
    });

    // Bulk form events
    var bulkDateEl = document.getElementById("bulk-date");
    if(bulkDateEl){
      bulkDateEl.addEventListener("change", function(){
        state.bulkForm.date = bulkDateEl.value;
      });
    }
    Array.prototype.forEach.call(document.querySelectorAll(".bulk-include"), function(cb){
      cb.addEventListener("change", function(){
        var ex = cb.getAttribute("data-ex");
        if(!state.bulkForm.rows[ex]) state.bulkForm.rows[ex] = {weight:"",sets:"",reps:"",include:true};
        state.bulkForm.rows[ex].include = cb.checked;
      });
    });
    var bulkAddBtn = document.getElementById("bulk-add-btn");
    if(bulkAddBtn){
      bulkAddBtn.addEventListener("click", function(){
        syncBulkFormFromDOM();
        var bf = state.bulkForm;
        var date = bf.date || todayISO();
        var addedCount = 0;
        Object.keys(bf.rows).forEach(function(ex){
          var row = bf.rows[ex];
          if(!row.include) return;
          if(!row.weight && !row.sets && !row.reps) return;
          state.diary.push({
            id: Date.now()+"_"+Math.random().toString(36).slice(2,8)+"_"+addedCount,
            exercise: ex,
            customName: "",
            date: date,
            weight: row.weight,
            sets: row.sets,
            reps: row.reps,
            note: ""
          });
          addedCount++;
        });
        if(addedCount===0){
          alert("Отметь хотя бы одно упражнение с заполненными данными");
          return;
        }
        saveDiary();
        state.bulkForm = { date:"", rows:{} };
        renderContent();
      });
    }
  }

  function syncBulkFormFromDOM(){
    var dateEl = document.getElementById("bulk-date");
    if(dateEl) state.bulkForm.date = dateEl.value;
    Array.prototype.forEach.call(document.querySelectorAll(".bulk-weight"), function(el){
      var ex = el.getAttribute("data-ex");
      if(!state.bulkForm.rows[ex]) state.bulkForm.rows[ex] = {weight:"",sets:"",reps:"",include:true};
      state.bulkForm.rows[ex].weight = el.value;
    });
    Array.prototype.forEach.call(document.querySelectorAll(".bulk-sets"), function(el){
      var ex = el.getAttribute("data-ex");
      if(!state.bulkForm.rows[ex]) state.bulkForm.rows[ex] = {weight:"",sets:"",reps:"",include:true};
      state.bulkForm.rows[ex].sets = el.value;
    });
    Array.prototype.forEach.call(document.querySelectorAll(".bulk-reps"), function(el){
      var ex = el.getAttribute("data-ex");
      if(!state.bulkForm.rows[ex]) state.bulkForm.rows[ex] = {weight:"",sets:"",reps:"",include:true};
      state.bulkForm.rows[ex].reps = el.value;
    });
    Array.prototype.forEach.call(document.querySelectorAll(".bulk-include"), function(el){
      var ex = el.getAttribute("data-ex");
      if(!state.bulkForm.rows[ex]) state.bulkForm.rows[ex] = {weight:"",sets:"",reps:"",include:true};
      state.bulkForm.rows[ex].include = el.checked;
    });
  }

  function syncDiaryFormFromDOM(){
    var exEl = document.getElementById("diary-exercise");
    var nameEl = document.getElementById("diary-customname");
    var dateEl = document.getElementById("diary-date");
    var weightEl = document.getElementById("diary-weight");
    var setsEl = document.getElementById("diary-sets");
    var repsEl = document.getElementById("diary-reps");
    var noteEl = document.getElementById("diary-note");
    if(exEl) state.diaryForm.exercise = exEl.value;
    if(nameEl) state.diaryForm.customName = nameEl.value;
    if(dateEl) state.diaryForm.date = dateEl.value;
    if(weightEl) state.diaryForm.weight = weightEl.value;
    if(setsEl) state.diaryForm.sets = setsEl.value;
    if(repsEl) state.diaryForm.reps = repsEl.value;
    if(noteEl) state.diaryForm.note = noteEl.value;
  }

  function setSection(sec){
    state.section = sec;
    state.tab = sec==="gym" ? "workout" : "home_workout";
    state.openNote = null;
    document.getElementById("sec-gym").style.background = sec==="gym" ? "#c8f54a" : "#1a1a1a";
    document.getElementById("sec-gym").style.color = sec==="gym" ? "#000" : "#555";
    document.getElementById("sec-home").style.background = sec==="home" ? "#fb923c" : "#1a1a1a";
    document.getElementById("sec-home").style.color = sec==="home" ? "#000" : "#555";
    renderTabbar();
    renderContent();
  }

  document.getElementById("sec-gym").addEventListener("click", function(){ setSection("gym"); });
  document.getElementById("sec-home").addEventListener("click", function(){ setSection("home"); });

  load();
  loadDiary();
  renderTabbar();
  renderContent();
})();
</script>
</body>
</html>
